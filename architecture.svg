<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>XHRONOS governance middleware architecture</title>
<desc>Flowchart showing how an AI agent request flows through the XHRONOS governance pipeline before reaching human-approved execution.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: system-ui, sans-serif; }
  .th  { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
</style>
</defs>

<!-- AI Agent -->
<rect x="240" y="20" width="200" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#3C3489">AI agent</text>
<text class="ts" x="340" y="57" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Submits proposal</text>

<line x1="340" y1="68" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- Proposal Registry -->
<rect x="200" y="100" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Proposal registry</text>
<text class="ts" x="340" y="137" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">XHRONOSProposalRegistryV4 — on-chain</text>

<line x1="340" y1="148" x2="340" y2="180" class="arr" marker-end="url(#arrow)"/>

<!-- Policy Evaluator -->
<rect x="200" y="180" width="280" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="200" text-anchor="middle" dominant-baseline="central" fill="#085041">Policy evaluator</text>
<text class="ts" x="340" y="217" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Whitelist · policy · risk checks</text>

<line x1="340" y1="228" x2="340" y2="260" class="arr" marker-end="url(#arrow)"/>

<!-- Consensus Layer -->
<rect x="200" y="260" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="282" text-anchor="middle" dominant-baseline="central" fill="#085041">Consensus layer</text>
<text class="ts" x="340" y="300" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">3 evaluators — 2 of 3 threshold</text>

<line x1="340" y1="316" x2="340" y2="348" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="358" y="337" fill="#5F5E5A">APPROVED</text>

<!-- Execution Permit -->
<rect x="200" y="348" width="280" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="368" text-anchor="middle" dominant-baseline="central" fill="#633806">Execution permit</text>
<text class="ts" x="340" y="385" text-anchor="middle" dominant-baseline="central" fill="#854F0B">24h TTL · replay protection</text>

<line x1="340" y1="396" x2="340" y2="428" class="arr" marker-end="url(#arrow)"/>

<!-- Human Review -->
<rect x="200" y="428" width="280" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="448" text-anchor="middle" dominant-baseline="central" fill="#712B13">Human review</text>
<text class="ts" x="340" y="465" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Architect approves manually</text>

<line x1="340" y1="476" x2="340" y2="508" class="arr" marker-end="url(#arrow)"/>

<!-- Execution -->
<rect x="200" y="508" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="528" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Execution</text>
<text class="ts" x="340" y="545" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">PayoutRouter or other action</text>

<!-- REJECTED branch -->
<line x1="200" y1="288" x2="100" y2="288" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="20" y="265" width="80" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="60" y="283" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Rejected</text>
<text class="ts" x="60" y="300" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Logged</text>
<text class="ts" x="148" y="278" text-anchor="middle" fill="#5F5E5A">REJECTED</text>

<!-- On-chain label -->
<rect x="500" y="90" width="84" height="116" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="542" y="130" text-anchor="middle" fill="#888780">on-chain</text>
<text class="ts" x="542" y="148" text-anchor="middle" fill="#888780">Base Mainnet</text>

<!-- Off-chain label -->
<rect x="500" y="220" width="84" height="214" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="542" y="310" text-anchor="middle" fill="#888780">off-chain</text>
<text class="ts" x="542" y="328" text-anchor="middle" fill="#888780">Node.js</text>

</svg>
